<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#08080c" />
<title>GioLens · Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08080c; --panel:rgba(255,255,255,.035); --line:rgba(255,255,255,.08);
    --txt:#ecedf2; --dim:#8a8c99; --faint:#5b5d6b;
    --a1:#22d3ee; --a2:#a78bfa; --up:#34d399; --down:#fb7185; --amber:#fbbf24;
    --r:20px;
  }
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  #bg{position:fixed;inset:0;z-index:-2;display:block}
  .aurora{position:fixed;z-index:-1;pointer-events:none;filter:blur(90px);opacity:.42}
  .aurora.a{top:-18vh;left:-12vw;width:60vw;height:60vw;
    background:radial-gradient(circle,#1e6f8e,transparent 62%);animation:drift 26s ease-in-out infinite}
  .aurora.b{bottom:-22vh;right:-14vw;width:62vw;height:62vw;
    background:radial-gradient(circle,#5b3aa6,transparent 62%);animation:drift 32s ease-in-out infinite reverse}
  @keyframes drift{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(6vw,4vh,0) scale(1.16)}}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 80px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:28px}
  .brand{font-size:21px;font-weight:600;letter-spacing:.14em;
    background:linear-gradient(92deg,var(--a1),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand span{color:var(--faint);-webkit-text-fill-color:var(--faint);font-weight:400}
  .v2{font-size:10px;letter-spacing:.16em;color:var(--faint);border:1px solid var(--line);
    padding:3px 8px;border-radius:99px;text-transform:uppercase}
  .spacer{flex:1}
  .live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)}70%{box-shadow:0 0 0 9px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  button.refresh{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:99px;
    padding:9px 16px;font-size:12.5px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:.25s;backdrop-filter:blur(8px)}
  button.refresh:hover{border-color:var(--a1);transform:translateY(-1px);box-shadow:0 8px 24px -10px var(--a1)}
  button.refresh:active{transform:scale(.96)}
  .refresh svg{transition:transform .6s cubic-bezier(.4,0,.2,1)}
  .refresh.spin svg{transform:rotate(360deg)}
  .toggle{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:99px;
    padding:4px;backdrop-filter:blur(8px)}
  .toggle button{background:transparent;border:0;color:var(--dim);font-family:inherit;font-size:11.5px;
    padding:6px 13px;border-radius:99px;cursor:pointer;transition:.2s;white-space:nowrap}
  .toggle button.on{background:linear-gradient(92deg,var(--a1),var(--a2));color:#06121a;font-weight:600}

  .hero{margin-bottom:18px;opacity:0;animation:rise .8s .05s cubic-bezier(.2,.7,.2,1) forwards}
  .hero .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .hero .big{font-size:clamp(44px,8.5vw,82px);font-weight:200;letter-spacing:-.02em;line-height:1.05;margin:6px 0}
  .hero .big b{font-weight:200;background:linear-gradient(92deg,var(--a1),var(--a2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .sub{font-size:13px;color:var(--dim)}

  .ranges{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:99px;
    padding:4px;backdrop-filter:blur(8px);width:fit-content;margin-bottom:18px}
  .ranges button{background:transparent;border:0;color:var(--dim);font-family:inherit;font-size:12px;
    padding:7px 16px;border-radius:99px;cursor:pointer;transition:.2s}
  .ranges button.on{background:rgba(255,255,255,.1);color:var(--txt);font-weight:600}

  .sec-t{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
    margin:34px 0 14px;display:flex;align-items:center;gap:10px}
  .sec-t::after{content:"";flex:1;height:1px;background:var(--line)}
  .grid{display:grid;gap:14px}
  .k4{grid-template-columns:repeat(4,1fr)}
  .k3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:780px){.k4{grid-template-columns:repeat(2,1fr)}.k3{grid-template-columns:1fr}}

  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:20px;backdrop-filter:blur(14px);transform-style:preserve-3d;
    transition:transform .12s ease-out,box-shadow .3s,border-color .3s;will-change:transform;
    opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
  .card::before{content:"";position:absolute;inset:0;border-radius:var(--r);opacity:0;transition:opacity .3s;
    background:radial-gradient(420px circle at var(--mx,50%) var(--my,0%),rgba(255,255,255,.09),transparent 42%);pointer-events:none}
  .card:hover{border-color:rgba(255,255,255,.16)}
  .card:hover::before{opacity:1}
  @keyframes rise{from{opacity:0;transform:translateY(22px) rotateX(7deg)}to{opacity:1;transform:none}}
  .card .kl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .card .kv{font-size:31px;font-weight:250;letter-spacing:-.02em;margin-top:8px}
  .card .kd{font-size:12px;margin-top:7px;display:flex;align-items:center;gap:5px;color:var(--dim)}
  .kd .up{color:var(--up)} .kd .down{color:var(--down)}
  .ico{position:absolute;top:18px;right:18px;font-size:15px;opacity:.5}

  .chart{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;
    backdrop-filter:blur(14px);opacity:0;animation:rise .7s .1s cubic-bezier(.2,.7,.2,1) forwards}
  .chart h4{font-size:13px;font-weight:500;color:var(--dim);margin-bottom:2px}
  .chart .meta{font-size:11px;color:var(--faint);margin-bottom:14px}
  svg.spark{width:100%;height:150px;display:block;overflow:visible}
  svg.spark path.line{fill:none;stroke:url(#g1);stroke-width:2.4;stroke-linecap:round;
    stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.8s .25s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  svg.spark path.fill{fill:url(#g2);opacity:0;animation:fade 1s 1.1s forwards}
  @keyframes fade{to{opacity:1}}

  /* pipelines · embudo */
  .pipe{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;
    backdrop-filter:blur(14px);transform-style:preserve-3d;transition:transform .12s ease-out,border-color .3s;
    will-change:transform;opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards;position:relative;overflow:hidden}
  .pipe::before{content:"";position:absolute;inset:0;border-radius:var(--r);opacity:0;transition:.3s;
    background:radial-gradient(380px circle at var(--mx,50%) var(--my,0%),rgba(255,255,255,.08),transparent 45%);pointer-events:none}
  .pipe:hover::before{opacity:1}
  .pipe .pn{font-size:14px;font-weight:500}
  .pipe .pid{font-size:10.5px;color:var(--faint);letter-spacing:.05em}
  .pipe .pt{font-size:27px;font-weight:250;margin:10px 0 2px}
  .funnel{display:flex;height:8px;border-radius:99px;overflow:hidden;margin:12px 0 8px;background:rgba(255,255,255,.05)}
  .funnel i{height:100%;transition:flex-grow 1s cubic-bezier(.4,0,.2,1)}
  .fl{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:10.5px;color:var(--dim)}
  .fl span{display:flex;align-items:center;gap:5px}
  .fl b{width:7px;height:7px;border-radius:2px;display:inline-block}
  .frate{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);
    margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .frate u{color:var(--a1);font-style:normal;font-weight:600}
  .lock{font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:99px;padding:2px 7px}

  .camp{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);
    border-radius:14px;background:var(--panel);margin-bottom:9px;transition:.25s;
    opacity:0;animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards}
  .camp:hover{transform:translateX(4px);border-color:rgba(255,255,255,.16)}
  .camp .rank{font-size:13px;color:var(--faint);width:22px;font-weight:300}
  .camp .cn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .camp .cs{font-size:13px;color:var(--a1);font-weight:500}

  /* estatus del proyecto */
  .proj{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:24px;
    backdrop-filter:blur(14px);opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
  .phead{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-bottom:8px}
  .ring{position:relative;width:96px;height:96px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .pc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pc b{font-size:24px;font-weight:300}
  .ring .pc s{font-size:9px;letter-spacing:.1em;color:var(--faint);text-decoration:none;text-transform:uppercase}
  .phead .pi{flex:1;min-width:200px}
  .phead .pi h3{font-size:16px;font-weight:600}
  .phead .pi p{font-size:12px;color:var(--dim);margin-top:3px}
  .legend{display:flex;gap:6px 14px;flex-wrap:wrap;font-size:10.5px;color:var(--dim);margin:14px 0 18px}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

  .capa{border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .25s}
  .capa:hover{border-color:rgba(255,255,255,.15)}
  .capa>.ch{display:flex;align-items:center;gap:13px;padding:13px 15px;cursor:pointer}
  .capa .cnum{font-size:10px;color:var(--faint);letter-spacing:.1em;width:46px}
  .capa .ctt{flex:1;font-size:13px;font-weight:500}
  .capa .cbar{width:120px;height:6px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
  .capa .cbar i{display:block;height:100%;border-radius:99px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
  .capa .cpct{font-size:13px;font-weight:600;width:42px;text-align:right}
  .capa .cax{font-size:12px;color:var(--faint);transition:transform .25s;width:14px}
  .capa.open .cax{transform:rotate(90deg)}
  .mods{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
  .capa.open .mods{max-height:520px}
  .mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 14px;padding:6px 15px 15px}
  @media(max-width:680px){.mgrid{grid-template-columns:1fr}.capa .cbar{width:64px}}
  .mod{display:flex;align-items:center;gap:9px;font-size:12px}
  .mod .md{flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mod .mb{width:46px;height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
  .mod .mb i{display:block;height:100%;border-radius:99px}
  .mod .mp{width:34px;text-align:right;font-size:11px;color:var(--faint)}

  .alerts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  @media(max-width:780px){.alerts{grid-template-columns:1fr}}
  .alert{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:rgba(255,255,255,.02)}
  .alert.blk{border-color:rgba(251,113,133,.3)}
  .alert.rsk{border-color:rgba(251,191,36,.28)}
  .alert.hit{border-color:rgba(52,211,153,.28)}
  .alert .at{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .alert .ad{font-size:12.5px;color:var(--dim);line-height:1.45}
  .alert.blk .at{color:var(--down)} .alert.rsk .at{color:var(--amber)} .alert.hit .at{color:var(--up)}

  .foot{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
    font-size:11.5px;color:var(--faint);display:flex;gap:8px 20px;flex-wrap:wrap}
  .foot b{color:var(--dim);font-weight:500}
  .err{color:var(--down);font-size:12px}
  .skel{color:var(--faint)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="aurora a"></div><div class="aurora b"></div>

<div class="wrap">
  <header>
    <div class="brand">GIOLENS<span> · vision care</span></div>
    <div class="v2">dashboard v2</div>
    <div class="spacer"></div>
    <div class="toggle" id="tg">
      <button class="on" data-acc="nuevo">Portafolio nuevo</button>
      <button data-acc="anterior">anterior</button>
    </div>
    <div class="live"><span class="dot"></span><span id="upd">conectando…</span></div>
    <button class="refresh" id="rf" title="Actualizar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
        stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Actualizar
    </button>
  </header>

  <section class="hero">
    <div class="lbl" id="h-lbl">Inversión publicitaria · Meta Ads</div>
    <div class="big">$<b id="h-spend">0</b></div>
    <div class="sub" id="h-sub">cargando métricas de Meta Ads…</div>
  </section>

  <div class="ranges" id="rg">
    <button data-r="hoy">Hoy</button>
    <button data-r="ayer">Ayer</button>
    <button class="on" data-r="7d">7 días</button>
    <button data-r="30d">30 días</button>
  </div>

  <div class="grid k4" id="kpis"></div>

  <div class="sec-t">Tendencia · 30 días</div>
  <div class="chart">
    <h4>Inversión diaria</h4>
    <div class="meta" id="trend-meta">cargando…</div>
    <svg class="spark" id="spark" preserveAspectRatio="none" viewBox="0 0 600 150">
      <defs>
        <linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
        <linearGradient id="g2" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#22d3ee" stop-opacity=".26"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></linearGradient>
      </defs>
    </svg>
  </div>

  <div class="sec-t">Campañas top</div>
  <div id="camps"><div class="camp skel"><span class="cn">cargando campañas…</span></div></div>

  <div class="sec-t">Pipelines CRM · embudo</div>
  <div class="grid k3" id="pipes"></div>

  <div class="sec-t">Estatus del proyecto GIOCORE</div>
  <div class="proj" id="proj"></div>

  <div class="foot" id="foot"><span class="skel">verificando fuentes de datos…</span></div>
</div>

<script>
/* ════ datos del proyecto · snapshot presentación 16 may 2026 ════════ */
const PROYECTO={
  total:33, corte:'16 may 2026',
  resumen:'8 capas · 60+ módulos · 5 motores operativos · 89 archivos código frío',
  capas:[
    {n:'01',t:'Fuentes de datos',p:28,m:[['Meta Ads API',100],['Wapify CRM (31k)',80],['Historial WhatsApp',40],['Inventarios ópticas',0],['POS / Punto de venta',0],['Expedientes clínicos',0],['Proveedores / catálogos',0],['Facturación / contab.',0]]},
    {n:'02',t:'Ingesta / APIs Vercel',p:17,m:[['9 funciones /api/*',90],['text-utils.js (fusión)',30],['state.js (persistencia)',30],['Fix etiqueta período',0],['Fix relleno días 0',0],['API inventarios',0],['API expedientes',0],['API POS sync',0],['API facturación',0]]},
    {n:'03',t:'Infraestructura backend',p:36,m:[['Vitest setup',100],['Inngest jobs',85],['Evals (30 goldens)',80],['Supabase (bloqueado)',20],['LangSmith (decisión)',0],['Storage media',0],['Auth / roles',0],['Notificaciones',0]]},
    {n:'04',t:'Agentes IA (cerebro)',p:60,m:[['QA (6/6 ✓)',100],['Analista',95],['Creativo',95],['Optimización',95],['Shared modules',95],['Desarrollador',0],['Atención al cliente',0],['Optometrista asist.',0]]},
    {n:'05',t:'Motores Copilot Sales',p:100,m:[['#1 Auto-Prompt (3v)',100],['#2 Predictor',100],['#3 Microsegmentación',100],['#4 Arbitraje',100],['#5 Copiloto Sales',100]]},
    {n:'06',t:'Interfaces de usuario',p:26,m:[['Panel aprobaciones',100],['Dashboard web',70],['Bot WhatsApp',60],['Dashboard inventarios',0],['Extensiones Chrome',0],['App móvil vendedores',0],['App optometrista',0],['Portal cliente',0],['Sistema citas online',0]]},
    {n:'07',t:'Productos / Campañas',p:0,m:[['Holbrook',0],['Deportivo',0],['Dama',0],['Z87',0],['GioVision / GioSports',0]]},
    {n:'08',t:'Operaciones y procesos',p:0,m:[['Automat. inventarios',0],['Expedientes digitales',0],['Fidelización clientes',0],['Seguimientos post-venta',0],['Sistema citas / agenda',0],['Comisiones vendedores',0],['Devoluciones / garantías',0],['Reportes ejecutivos',0]]},
  ],
  alerts:[
    {c:'blk',t:'Bloqueador maestro',d:'Credenciales Meta + Supabase · 6/6 keys faltantes · ~25 min Isaac · destraba Capas 2-4'},
    {c:'rsk',t:'Riesgo crítico',d:'Token Meta vence 1-jul-2026 · necesita refresh automático'},
    {c:'hit',t:'Siguiente hito',d:'Sprint 1 desplegado · Migración + Analista en shadow mode'},
  ],
};

/* ════ helpers ══════════════════════════════════════════════════════ */
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const nf=new Intl.NumberFormat('es-MX');
const money=n=>'$'+nf.format(Math.round(n));
const pct=n=>(n>0?'+':'')+n.toFixed(1)+'%';
const num=v=>{const n=parseFloat(v);return isFinite(n)?n:0;};
async function getJSON(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json();}
function statusColor(p){return p>=100?'#34d399':p>=70?'#22d3ee':p>=30?'#fbbf24':p>0?'#fb7185':'#5b5d6b';}

function countUp(el,to,fmt){
  const t0=performance.now(),dur=1000;
  (function tick(t){let p=Math.min(1,(t-t0)/dur);p=p===1?1:1-Math.pow(2,-10*p);
    el.textContent=fmt(to*p);if(p<1)requestAnimationFrame(tick);})(t0);
}
function tilt(el,max=9){
  el.addEventListener('mousemove',e=>{
    const r=el.getBoundingClientRect(),px=(e.clientX-r.left)/r.width,py=(e.clientY-r.top)/r.height;
    el.style.transform=`perspective(820px) rotateY(${(px-.5)*max*2}deg) rotateX(${(.5-py)*max*2}deg) translateZ(6px)`;
    el.style.setProperty('--mx',px*100+'%');el.style.setProperty('--my',py*100+'%');
  });
  el.addEventListener('mouseleave',()=>{el.style.transform='';});
}

/* ════ fondo de partículas 3D ═══════════════════════════════════════ */
(function bg(){
  const c=$('#bg'),x=c.getContext('2d');let w,h,ps,mx=.5,my=.5;
  function size(){w=c.width=innerWidth;h=c.height=innerHeight;
    const n=innerWidth<700?34:70;
    ps=Array.from({length:n},()=>({x:Math.random(),y:Math.random(),z:Math.random()*.85+.15,
      vx:(Math.random()-.5)*.0006,vy:(Math.random()-.5)*.0006}));}
  size();addEventListener('resize',size);
  addEventListener('mousemove',e=>{mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
  (function loop(){
    x.clearRect(0,0,w,h);
    for(const p of ps){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      const par=(p.z-.5)*40,sx=p.x*w+(mx-.5)*par,sy=p.y*h+(my-.5)*par;
      x.beginPath();x.arc(sx,sy,p.z*1.7,0,6.283);
      x.fillStyle='rgba(150,180,235,'+(p.z*.42)+')';x.fill();
    }
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
      const a=ps[i],b=ps[j],dx=(a.x-b.x)*w,dy=(a.y-b.y)*h,d=Math.hypot(dx,dy);
      if(d<108){x.beginPath();
        x.moveTo(a.x*w+(mx-.5)*(a.z-.5)*40,a.y*h+(my-.5)*(a.z-.5)*40);
        x.lineTo(b.x*w+(mx-.5)*(b.z-.5)*40,b.y*h+(my-.5)*(b.z-.5)*40);
        x.strokeStyle='rgba(120,150,210,'+(.07*(1-d/108))+')';x.lineWidth=1;x.stroke();}
    }
    requestAnimationFrame(loop);
  })();
})();

/* ════ estado ═══════════════════════════════════════════════════════ */
let ACCOUNT='nuevo',RANGE='7d',OVERVIEW={},DAILY=[];

const RANGE_LBL={hoy:'Hoy',ayer:'Ayer','7d':'últimos 7 días','30d':'últimos 30 días'};
function convOf(actions){
  if(!Array.isArray(actions))return 0;
  for(const t of['onsite_conversion.total_messaging_connection',
    'onsite_conversion.messaging_conversation_started_7d','messaging_conversation_started'])
    {const h=actions.find(a=>a.action_type===t);if(h)return num(h.value);}
  return 0;
}
function agg(rows){
  const s=rows.reduce((a,r)=>({spend:a.spend+num(r.spend),impressions:a.impressions+num(r.impressions),
    clicks:a.clicks+num(r.clicks),conv:a.conv+num(r.conv)}),{spend:0,impressions:0,clicks:0,conv:0});
  s.cpc=s.clicks?s.spend/s.clicks:0;
  s.cpm=s.impressions?s.spend/s.impressions*1000:0;
  s.ctr=s.impressions?s.clicks/s.impressions*100:0;
  return s;
}
function sliceFor(r,d){
  const n=d.length;
  if(r==='hoy')  return{cur:d.slice(n-1),       prev:d.slice(n-2,n-1)};
  if(r==='ayer') return{cur:d.slice(n-2,n-1),   prev:d.slice(n-3,n-2)};
  if(r==='7d')   return{cur:d.slice(n-7),       prev:d.slice(n-14,n-7)};
  return{cur:d.slice(),prev:[]};
}

/* ════ render KPIs (según rango) ════════════════════════════════════ */
const KPI=[
  {k:'spend',l:'Inversión',i:'◈',fmt:money},
  {k:'cpc',l:'CPC',i:'⊙',fmt:v=>'$'+v.toFixed(2),inv:1},
  {k:'cpm',l:'CPM',i:'⊞',fmt:v=>'$'+v.toFixed(2),inv:1},
  {k:'ctr',l:'CTR',i:'⤢',fmt:v=>v.toFixed(2)+'%'},
  {k:'impressions',l:'Impresiones',i:'◫',fmt:v=>nf.format(Math.round(v))},
  {k:'clicks',l:'Clicks',i:'➤',fmt:v=>nf.format(Math.round(v))},
  {k:'conv',l:'Conversaciones',i:'✦',fmt:v=>nf.format(Math.round(v))},
  {k:'reach',l:'Alcance · 7d',i:'◍',fmt:v=>nf.format(Math.round(v)),fixed7d:1},
];
function applyRange(){
  $$('#rg button').forEach(b=>b.classList.toggle('on',b.dataset.r===RANGE));
  $('#h-lbl').textContent='Inversión publicitaria · '+RANGE_LBL[RANGE];
  const wrap=$('#kpis');
  if(!DAILY.length){
    wrap.innerHTML='<div class="card"><div class="kl">Meta Ads</div>'
      +'<div class="kv err" style="font-size:16px">sin actividad</div></div>';
    $('#h-spend').textContent='0';
    $('#h-sub').innerHTML='<span class="err">portafolio sin datos en el período</span>';
    return;
  }
  const {cur,prev}=sliceFor(RANGE,DAILY);
  const c=agg(cur),p=agg(prev);
  c.reach=num((OVERVIEW.curr||{}).reach);
  p.reach=num((OVERVIEW.prev||{}).reach);
  wrap.innerHTML='';
  KPI.forEach((d,i)=>{
    const v=num(c[d.k]),pv=num(p[d.k]);
    const card=document.createElement('div');card.className='card';card.style.animationDelay=(i*45)+'ms';
    let delta;
    if(d.fixed7d) delta='<div class="kd">— ventana fija 7 días</div>';
    else if(pv>0){
      const ch=(v-pv)/pv*100,good=d.inv?ch<0:ch>0;
      delta=`<div class="kd"><span class="${good?'up':'down'}">${ch>0?'▲':'▼'} ${pct(ch)}</span><span>vs. período previo</span></div>`;
    }else delta='<div class="kd">— sin comparativa</div>';
    card.innerHTML=`<div class="ico">${d.i}</div><div class="kl">${d.l}</div>
      <div class="kv">—</div>${delta}`;
    wrap.appendChild(card);tilt(card);
    countUp(card.querySelector('.kv'),v,d.fmt);
  });
  countUp($('#h-spend'),num(c.spend),n=>nf.format(Math.round(n)));
  $('#h-sub').textContent=`${nf.format(Math.round(c.impressions))} impresiones · `
    +`${nf.format(Math.round(c.clicks))} clicks · ${Math.round(c.conv)} conversaciones`;
}

/* ════ trend chart ══════════════════════════════════════════════════ */
function renderTrend(rows){
  const svg=$('#spark');[...svg.querySelectorAll('path')].forEach(p=>p.remove());
  if(!rows||!rows.length){$('#trend-meta').textContent='sin datos en el período';return;}
  const W=600,H=150,vals=rows.map(r=>num(r.spend));
  const max=Math.max(...vals,1),min=Math.min(...vals);
  const X=i=>i/(rows.length-1)*W,Y=v=>H-8-((v-min)/(max-min||1))*(H-22);
  let line=`M${X(0)},${Y(vals[0])}`;
  for(let i=1;i<rows.length;i++){
    const xm=(X(i-1)+X(i))/2;
    line+=` C${xm},${Y(vals[i-1])} ${xm},${Y(vals[i])} ${X(i)},${Y(vals[i])}`;
  }
  const NS='http://www.w3.org/2000/svg';
  const fill=document.createElementNS(NS,'path');
  fill.setAttribute('class','fill');fill.setAttribute('d',line+` L${W},${H} L0,${H} Z`);
  const ln=document.createElementNS(NS,'path');
  ln.setAttribute('class','line');ln.setAttribute('d',line);
  svg.appendChild(fill);svg.appendChild(ln);
  const total=vals.reduce((a,b)=>a+b,0);
  $('#trend-meta').textContent=`${rows.length} días · total ${money(total)} · promedio ${money(total/rows.length)}/día`;
}

/* ════ campañas ═════════════════════════════════════════════════════ */
function renderCamps(d){
  const wrap=$('#camps');wrap.innerHTML='';
  const list=(d&&d.data||[]).slice().sort((a,b)=>num(b.spend)-num(a.spend)).slice(0,6);
  if(!list.length){wrap.innerHTML='<div class="camp"><span class="cn skel">sin campañas activas</span></div>';return;}
  list.forEach((c,i)=>{
    const el=document.createElement('div');el.className='camp';el.style.animationDelay=(i*55)+'ms';
    el.innerHTML=`<span class="rank">${i+1}</span>
      <span class="cn">${c.campaign_name||c.campaign_id}</span>
      <span class="cs">${money(num(c.spend))}</span>`;
    wrap.appendChild(el);
  });
}

/* ════ pipelines · embudo (mode=journey) ════════════════════════════ */
const PHASE=[
  {k:'int1',l:'Int 1',c:'#22d3ee'},{k:'int2',l:'Int 2',c:'#38bdf8'},
  {k:'int3',l:'Int 3',c:'#a78bfa'},{k:'closing',l:'Cierre',c:'#fbbf24'},
  {k:'won',l:'Ganado',c:'#34d399'},{k:'lost',l:'Perdido',c:'#fb7185'},
];
function renderPipe(p,d,i){
  const el=document.createElement('div');el.className='pipe';el.style.animationDelay=(i*70)+'ms';
  if(!d||d.error){
    el.innerHTML=`<div class="pn">${p.name}</div><div class="pid">${p.id}</div>
      <div class="pt err" style="font-size:14px;margin-top:14px">sin datos</div>`;
    $('#pipes').appendChild(el);return;
  }
  const bp=d.by_phase||{},fr=d.funnel_rates||{},total=num(d.total);
  const sum=PHASE.reduce((a,ph)=>a+num(bp[ph.k]),0)||1;
  const segs=PHASE.map(ph=>`<i style="background:${ph.c};flex-grow:${num(bp[ph.k])}"></i>`).join('');
  const legend=PHASE.map(ph=>`<span><b style="background:${ph.c}"></b>${ph.l} ${nf.format(num(bp[ph.k]))}</span>`).join('');
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:start">
      <div><div class="pn">${p.name}</div><div class="pid">pipeline ${p.id}</div></div>
      ${p.lock?'<span class="lock">no-INT</span>':''}
    </div>
    <div class="pt" data-v="${total}">0</div><div class="pid">contactos totales</div>
    <div class="funnel">${sum>1?segs:''}</div>
    <div class="fl">${legend}</div>
    <div class="frate">
      <span>Int1→2 <u>${num(fr.int1_to_int2_pct)}%</u></span>
      <span>Int2→3 <u>${num(fr.int2_to_int3_pct)}%</u></span>
      <span>Ganado <u>${num(fr.overall_won_pct)}%</u></span>
    </div>`;
  $('#pipes').appendChild(el);tilt(el,6);
  countUp(el.querySelector('.pt'),total,n=>nf.format(Math.round(n)));
}

/* ════ estatus del proyecto ═════════════════════════════════════════ */
function renderProject(){
  const P=PROYECTO,el=$('#proj');
  const C=2*Math.PI*40,off=C*(1-P.total/100);
  let capas=P.capas.map(ca=>{
    const col=statusColor(ca.p);
    const mods=ca.m.map(([mn,mp])=>`<div class="mod">
      <span class="md">${mn}</span>
      <span class="mb"><i style="width:${mp}%;background:${statusColor(mp)}"></i></span>
      <span class="mp">${mp}%</span></div>`).join('');
    return `<div class="capa">
      <div class="ch">
        <span class="cnum">CAPA ${ca.n}</span>
        <span class="ctt">${ca.t}</span>
        <span class="cbar"><i data-w="${ca.p}" style="background:${col}"></i></span>
        <span class="cpct" style="color:${col}">${ca.p}%</span>
        <span class="cax">▸</span>
      </div>
      <div class="mods"><div class="mgrid">${mods}</div></div>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="phead">
      <div class="ring">
        <svg width="96" height="96"><circle cx="48" cy="48" r="40" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="7"/>
          <circle cx="48" cy="48" r="40" fill="none" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C}" id="ringp"/></svg>
        <div class="pc"><b id="ringn">0%</b><s>avance</s></div>
      </div>
      <div class="pi">
        <h3>GIOLENS · GIOCORE</h3>
        <p>${P.resumen}<br>Snapshot del proyecto · corte ${P.corte}</p>
      </div>
    </div>
    <div class="legend">
      <span><i style="background:#34d399"></i>Operativo 100%</span>
      <span><i style="background:#22d3ee"></i>Código listo 70-99%</span>
      <span><i style="background:#fbbf24"></i>En proceso 30-69%</span>
      <span><i style="background:#fb7185"></i>Bloqueado &lt;30%</span>
      <span><i style="background:#5b5d6b"></i>Por iniciar 0%</span>
    </div>
    ${capas}
    <div class="alerts">${P.alerts.map(a=>`<div class="alert ${a.c}">
      <div class="at">${a.t}</div><div class="ad">${a.d}</div></div>`).join('')}</div>`;
  /* anima el anillo + barras */
  requestAnimationFrame(()=>{
    const rp=$('#ringp');if(rp){rp.style.transition='stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)';rp.style.strokeDashoffset=off;}
    countUp($('#ringn'),P.total,n=>Math.round(n)+'%');
    $$('#proj .cbar i').forEach((i,k)=>setTimeout(()=>i.style.width=i.dataset.w+'%',200+k*70));
  });
  $$('#proj .capa .ch').forEach(ch=>ch.addEventListener('click',()=>ch.parentElement.classList.toggle('open')));
}

/* ════ load ═════════════════════════════════════════════════════════ */
const PIPES=[
  {id:'216977',name:'Justin · Holbrook'},{id:'755062',name:'GioSports'},
  {id:'252999',name:'SPY · Z87',lock:true},{id:'94103',name:'Dama · Luxury'},
  {id:'273944',name:'GioVision',lock:true},
];
let busy=false;
async function load(){
  if(busy)return;busy=true;$('#rf').classList.add('spin');
  const base=`/api/meta?account=${ACCOUNT}`;
  try{
    const [ov,daily,camp]=await Promise.all([
      getJSON(base).catch(()=>({})),
      getJSON(base+'&level=daily&days=30').catch(()=>({data:[]})),
      getJSON(base+'&level=campaign').catch(()=>({data:[]})),
    ]);
    OVERVIEW=ov||{};DAILY=(daily&&daily.data)||[];
    applyRange();
    renderTrend(DAILY);
    renderCamps(camp);
  }catch(e){$('#h-sub').innerHTML='<span class="err">error cargando Meta Ads</span>';}
  $('#pipes').innerHTML='';
  await Promise.all(PIPES.map((p,i)=>
    getJSON(`/api/pipeline-summary?pipeline_id=${p.id}&mode=journey`)
      .then(d=>renderPipe(p,d,i)).catch(()=>renderPipe(p,null,i))));
  try{
    const t=await getJSON('/api/token-status');
    $('#foot').innerHTML=`<span><b>Fuentes:</b></span>`
      +`<span>Meta Ads ${t.meta&&t.meta.configured?'✓ conectado':'✕'}</span>`
      +`<span>Wapify CRM ${t.wapify&&t.wapify.configured?'✓ conectado':'✕'}</span>`
      +`<span>Token Meta: ${(t.meta&&t.meta.expires)||'—'}</span>`
      +`<span><b>·</b> GioLens Vision Care</span>`;
  }catch(e){$('#foot').innerHTML='<span class="err">no se pudo verificar el estado de las fuentes</span>';}
  $('#upd').textContent='actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  setTimeout(()=>$('#rf').classList.remove('spin'),650);
  busy=false;
}

/* ════ eventos ══════════════════════════════════════════════════════ */
$('#rf').addEventListener('click',load);
$('#tg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  $$('#tg button').forEach(x=>x.classList.toggle('on',x===b));
  ACCOUNT=b.dataset.acc;load();
});
$('#rg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  RANGE=b.dataset.r;applyRange();
});
renderProject();
load();
setInterval(load,5*60*1000);
</script>
